<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HBD❤️ICA❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body id="bday-body">

  <div class="stars" id="stars"></div>
  <div class="aurora"></div>

  <div class="top-msg">🎉 It's Your Special Day! 🎉</div>

  <div class="cake">
    <div class="plate"></div>
    <div class="layer layer-1"></div>
    <div class="layer layer-2"></div>
    <div class="layer layer-3"></div>
    <div class="layer layer-4"></div>
    <div class="layer layer-top"></div>
    <div class="layer layer-top-cream1"></div>
    <div class="layer layer-top-cream2"></div>
    <div class="layer candle"></div>
  </div>

  <div class="msg">
    Happy Birthday ICA!!!
    <div class="msg-sub">Wishing you a day as wonderful as you are.<br>May your year be filled with joy, love &amp; cake! 🥳</div>
  </div>

  <div class="controls">
    <button id="blow-btn">🎂 Blow out the candle!</button>
  </div>

  <audio id="bday-audio" src="happy-birthday.mp3" preload="auto"></audio>

  <script src="./script.js"></script>
</body>
</html>
